{% extends "base.html" %}

{% block title %}
500 - Internal Server Error | SecureVault
{% endblock %}

{% block content %}

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-lg-8">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body text-center p-5">

                    <i class="fas fa-server fa-6x text-danger mb-4"></i>

                    <h1 class="display-1 fw-bold text-danger">

                        500

                    </h1>

                    <h3 class="fw-bold mb-3">

                        Internal Server Error

                    </h3>

                    <p class="text-muted fs-5">

                        Oops! Something went wrong on our server.
                        Please try again in a few moments.

                    </p>

                    <hr class="my-4">

                    <a
                        href="{{ url_for('auth.dashboard') if 'user_id' in session else url_for('auth.login') }}"
                        class="btn btn-danger btn-lg me-2">

                        <i class="fas fa-home me-2"></i>

                        Go Home

                    </a>

                    <button
                        onclick="location.reload()"
                        class="btn btn-outline-secondary btn-lg">

                        <i class="fas fa-sync-alt me-2"></i>

                        Retry

                    </button>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
