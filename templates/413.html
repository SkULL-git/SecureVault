{% extends "base.html" %}

{% block title %}
413 - File Too Large | SecureVault
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-7">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-body text-center p-5">

                    <i class="fas fa-file-upload fa-5x text-warning mb-4"></i>

                    <h1 class="display-3 fw-bold text-danger">

                        413

                    </h1>

                    <h2 class="fw-bold mb-3">

                        File Too Large

                    </h2>

                    <p class="text-muted fs-5">

                        The uploaded file exceeds the maximum allowed size.

                    </p>

                    <p class="text-muted">

                        Maximum allowed file size is
                        <strong>10 MB</strong>.

                    </p>

                    <div class="mt-4">

                        <a
                            href="{{ url_for('upload.upload_file') }}"
                            class="btn btn-primary me-2">

                            <i class="fas fa-upload me-2"></i>

                            Try Again

                        </a>

                        <a
                            href="{{ url_for('auth.dashboard') }}"
                            class="btn btn-secondary">

                            <i class="fas fa-home me-2"></i>

                            Dashboard

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
